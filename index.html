<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pausklocka – Sändningsstart</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="app-header compact-header">
      <div id="liveClock" class="live-clock">--:--:--</div>
    </header>

    <section class="card countdown-card">
      <div id="countdownLabel" class="card-label">Nedräkning till sändning</div>
      <div id="onAirCountdown" class="countdown-value">Ingen tid vald</div>
      <div id="countdownMeta" class="countdown-meta">Ställ tider för att starta flödet</div>
    </section>

    <section id="timesCard" class="card times-card">
      <div class="time-block">
        <div class="card-label">Sändningsstart</div>
        <button id="openOnAirPicker" class="time-pill" type="button">Ställ tid</button>
      </div>

      <div class="info-block">
        <div class="card-label muted-label">Billboard + intervjuer</div>
        <div class="split-info">
          <div class="split-row">
            <span class="split-label">Billboard</span>
            <span id="billboardDisplay" class="split-value">0:20</span>
          </div>
          <div class="split-row">
            <span class="split-label">Intervjuer</span>
            <span id="interviewDisplay" class="split-value">0:00</span>
          </div>
          <div class="split-row split-row-total">
            <span class="split-label">Totalt</span>
            <span id="occupiedDisplay" class="split-value">0:20</span>
          </div>
        </div>
      </div>

      <div class="time-block">
        <div class="card-label">Matchstart</div>
        <button id="openMatchPicker" class="time-pill secondary-pill" type="button">Ställ tid</button>
      </div>
    </section>

    <button id="nextBtn" class="next-btn" type="button">Nästa</button>
  </main>

  <div id="timePickerOverlay" class="timepicker-overlay hidden" aria-hidden="true">
    <div class="timepicker-box">
      <div id="timePickerTitle" class="timepicker-title">Välj tid</div>

      <div class="timepicker-scrolls">
        <select id="pickerHours" aria-label="Timmar"></select>
        <span>:</span>
        <select id="pickerMinutes" aria-label="Minuter"></select>
        <span>:</span>
        <select id="pickerSeconds" aria-label="Sekunder"></select>
      </div>

      <div class="timepicker-actions">
        <button id="pickerCancel" class="secondary-btn" type="button">Avbryt</button>
        <button id="pickerSet" type="button">OK</button>
      </div>
    </div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
